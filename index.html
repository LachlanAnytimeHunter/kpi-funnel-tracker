<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Funnel Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Sales Funnel KPI Tracker</p>
        <h1>KPI Funnel Tracker</h1>
      </div>
      <div class="topbar-actions">
        <button id="open-settings" class="ghost-button" type="button">Sheets Settings</button>
        <span id="save-status" class="save-status">Ready</span>
      </div>
    </header>

    <nav id="club-tabs" class="club-tabs" aria-label="Club navigation"></nav>

    <main>
      <section id="group-view" class="view-panel"></section>
      <section id="club-view" class="view-panel hidden"></section>
    </main>
  </div>

  <aside id="settings-drawer" class="settings-drawer hidden" aria-hidden="true">
    <div class="settings-card">
      <div class="settings-header">
        <div>
          <p class="eyebrow">Google Sheets Integration</p>
          <h2>Published CSV Mapping</h2>
        </div>
        <button id="close-settings" class="icon-button" type="button" aria-label="Close settings">×</button>
      </div>

      <p class="settings-copy">
        Paste each club's published Google Sheets CSV link. The app will try to match rows by month and map
        common member and income columns automatically.
      </p>

      <div id="settings-form" class="settings-form"></div>

      <div class="settings-footer">
        <button id="sync-sheets" class="primary-button" type="button">Sync From Sheets</button>
      </div>
    </div>
  </aside>
</body>
</html>
